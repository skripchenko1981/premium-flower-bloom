# =============================================================================
# Frontend container — внутрішній Nginx для роздачі статики React SPA
# Цей конфіг використовується ТІЛЬКИ всередині frontend-контейнера.
# Зовнішній проксі (ваш основний Nginx) дивиться в цей контейнер.
# =============================================================================

worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- Logs ---
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # --- Basic optimizations ---
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    # --- Gzip ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # --- Server ---
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # SPA fallback — всі маршрути → index.html
        location / {
            try_files $uri $uri/ /index.html;

            # Кешування для статики з хешами в імені
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # Заборона доступу до прихованих файлів
        location ~ /\. {
            deny all;
        }
    }
}
