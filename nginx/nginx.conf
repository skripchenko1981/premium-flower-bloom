# =============================================================================
# Flower Shop — Nginx Site Configuration
# =============================================================================
# Інтегруйте цей файл у ваш основний Nginx:
#
#   Варіант A — симлінк у sites-enabled:
#     sudo ln -s /path/to/nginx/nginx.conf /etc/nginx/sites-enabled/flower-shop
#
#   Варіант B — include з основного контексту http:
#     include /path/to/nginx/nginx.conf;
#
# =============================================================================

upstream flower_frontend {
    # Коли Nginx запущений в Docker — використовуйте ім'я контейнера
    server frontend:80;
    # Коли Nginx на хості, а контейнери з опублікованими портами:
    # server 127.0.0.1:3000;
}

upstream flower_backend {
    server backend:8000;
    # server 127.0.0.1:8000;
}

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name flower-shop.local www.flower-shop.local;

    # ACME challenge for Let's Encrypt (certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS server
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name flower-shop.local www.flower-shop.local;

    # --- SSL (оновіть шляхи до ваших сертифікатів) ---
    ssl_certificate     /etc/letsencrypt/live/flower-shop.local/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flower-shop.local/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/flower-shop.local/chain.pem;

    # --- SSL performance & security ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # --- OCSP Stapling ---
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # --- HSTS (закоментовано — спочатку протестуйте) ---
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # -----------------------------------------------------------------------
    # Gzip
    # -----------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff
        font/woff2;

    # -----------------------------------------------------------------------
    # Security headers
    # -----------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy — адаптуйте під свої потреби
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: blob: https:;
        font-src 'self' data:;
        connect-src 'self' https: wss:;
        frame-src 'self';
        object-src 'none';
        base-uri 'self';
        form-action 'self';
    " always;

    add_header Permissions-Policy "
        camera=(),
        microphone=(),
        geolocation=(),
        interest-cohort=()
    " always;

    # -----------------------------------------------------------------------
    # Logs
    # -----------------------------------------------------------------------
    access_log /var/log/nginx/flower-shop.access.log;
    error_log  /var/log/nginx/flower-shop.error.log warn;

    # -----------------------------------------------------------------------
    # Frontend — статика (React SPA)
    # -----------------------------------------------------------------------
    location / {
        proxy_pass http://flower_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SPA fallback — всі шляхи віддають index.html
        proxy_intercept_errors on;
        error_page 404 /index.html;

        # Кешування статики (фронтенд сам виставить Cache-Control)
        proxy_cache_valid 200 1h;
    }

    # -----------------------------------------------------------------------
    # Backend API
    # -----------------------------------------------------------------------
    location /api/ {
        proxy_pass http://flower_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_set_header Connection $http_connection;
        proxy_read_timeout 86400s;

        # Не кешувати API
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # -----------------------------------------------------------------------
    # API Docs (Swagger / OpenAPI)
    # -----------------------------------------------------------------------
    location /docs {
        proxy_pass http://flower_backend/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://flower_backend/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -----------------------------------------------------------------------
    # Статичні файли (при потребі)
    # -----------------------------------------------------------------------
    location /static/ {
        alias /var/www/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
