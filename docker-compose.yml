services:
  # ========== PostgreSQL ==========
  postgres:
    image: postgres:16-alpine
    container_name: flower-postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sh:/docker-entrypoint-initdb.d/init.sh
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flower_shop}
      POSTGRES_USER: ${POSTGRES_USER:-flower_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flower_pass}
    ports:
      - "5432:5432"
    networks:
      - flower_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flower_user} -d ${POSTGRES_DB:-flower_shop}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ========== Backend (FastAPI) ==========
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flower-backend
    restart: unless-stopped
    volumes:
      - uploads_data:/app/uploads
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-flower_user}:${POSTGRES_PASSWORD:-flower_pass}@postgres:5432/${POSTGRES_DB:-flower_shop}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      DEBUG: ${DEBUG:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:5173","http://localhost:3000","https://flower-shop.local"]}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - flower_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ========== Frontend (React/Vite) ==========
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: flower-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - flower_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ========== Nginx ==========
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: flower-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - uploads_data:/usr/share/nginx/html/uploads:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - flower_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ========== Volumes ==========
volumes:
  postgres_data:
    name: flower_postgres_data
  uploads_data:
    name: flower_uploads_data

# ========== Network ==========
networks:
  flower_network:
    name: flower_network
    driver: bridge
