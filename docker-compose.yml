version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: flower-shop-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: flower_user
      POSTGRES_PASSWORD: flower_pass
      POSTGRES_DB: flower_shop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flower_user -d flower_shop"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flower-shop-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://flower_user:flower_pass@postgres:5432/flower_shop
      DATABASE_URL_SYNC: postgresql://flower_user:flower_pass@postgres:5432/flower_shop
      SECRET_KEY: ${SECRET_KEY:-change-this-to-a-long-random-secret-key}
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173","https://flower-shop.local"]'
      DEBUG: "False"
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flower-shop-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: /api/v1

  nginx:
    image: nginx:alpine
    container_name: flower-shop-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  uploads_data:
