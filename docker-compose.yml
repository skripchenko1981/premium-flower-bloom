# =============================================================================
# Flower Shop — Docker Compose
# =============================================================================
# Використання:
#   cp .env.example .env    # налаштуйте змінні оточення
#   docker compose up -d    # запустити всі сервіси
#   docker compose logs -f  # переглядати логи
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: flower-postgres
    restart: unless-stopped

    # Опублікований порт (для зовнішніх підключень, опціонально)
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    volumes:
      # Named volume для збереження даних
      - postgres_data:/var/lib/postgresql/data
      # Init скрипти (виконуються при першому запуску)
      - ./postgres/init:/docker-entrypoint-initdb.d

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flower_shop}
      POSTGRES_USER: ${POSTGRES_USER:-flower_shop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flower_shop} -d ${POSTGRES_DB:-flower_shop}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - flower_network

  # ---------------------------------------------------------------------------
  # Backend — FastAPI
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: flower-backend
    restart: unless-stopped

    ports:
      - "${BACKEND_PORT:-8000}:8000"

    environment:
      # Database (використовуємо ім'я сервісу, не localhost!)
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-flower_shop}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-flower_shop}"

      # JWT / Auth
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}

      # CORS (дозволяємо основний домен через Nginx)
      CORS_ORIGINS: ${CORS_ORIGINS:-https://flower-shop.local,http://localhost:3000}

      # Email
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@flower-shop.local}

      # Uploads
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-10}

    volumes:
      - uploads_data:/app/uploads

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    networks:
      - flower_network

  # ---------------------------------------------------------------------------
  # Frontend — React SPA (Nginx)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: flower-frontend
    restart: unless-stopped

    ports:
      - "${FRONTEND_PORT:-3000}:80"

    depends_on:
      - backend

    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    networks:
      - flower_network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    name: flower_postgres_data
  uploads_data:
    name: flower_uploads_data

# =============================================================================
# Networks
# =============================================================================
networks:
  flower_network:
    name: flower_network
    driver: bridge
